<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiluLab API - Image Classifiers</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/inference.css">
</head>

<body>
    <div id="sidebar-placeholder"></div>

    <div class="main-wrapper">
        <div class="container">

            <!-- Tab Bar -->
            <div class="tab-bar">
                <button class="tab-btn active" id="tab-inference" onclick="switchTab('inference')">Inference
                    Engine</button>
                <button class="tab-btn" id="tab-finetuning" onclick="switchTab('finetuning')">Fine-Tuning
                    System</button>
            </div>

            <!-- ─── Tab: Inference Engine ─── -->
            <div class="tab-panel active" id="panel-inference">
                <div class="card">
                    <h2>Inference Engine</h2>
                    <form id="predictForm">
                        <div class="drop-zone" id="dropZone">
                            <p>Drag &amp; drop or click to upload</p>
                            <div class="preview-container" id="previewContainer">
                                <img id="previewImage" src="" alt="Preview">
                                <button type="button"
                                    style="position:absolute;top:15px;right:15px;background:var(--dark);color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:12px;"
                                    id="removePhotoBtn">REMOVE</button>
                            </div>
                        </div>
                        <input type="file" id="imageInput" name="image" accept="image/*" style="display:none">

                        <div class="form-grid">
                            <label>Architecture
                                <select name="model">
                                    <option value="resnet18">ResNet18</option>
                                    <option value="resnet50">ResNet50</option>
                                    <option value="densenet121">DenseNet-121</option>
                                    <option value="mobilenet_v3_small">MobileNet v3 (Small)</option>
                                    <option value="mobilenet_v3_large">MobileNet v3 (Large)</option>
                                    <option value="clip-vit-base-patch32">CLIP (Zero-Shot)</option>
                                </select>
                            </label>
                            <label>Device
                                <select name="device">
                                    <option value="cpu">CPU</option>
                                    <option value="cuda" selected>CUDA</option>
                                </select>
                            </label>
                            <label>Number of Top Predictions
                                <input type="number" name="topk" id="topkInput" value="3" min="1" max="10">
                            </label>
                            <hr
                                style="grid-column: 1 / -1; border: 0; border-top: 1px solid rgba(255, 255, 255, 0.2); margin: 1rem 0;">
                            <label>Custom Weights (optional)
                                <input type="text" name="weights" placeholder="/path/to/best.pt">
                            </label>
                            <label>Class Map (optional)
                                <input type="text" name="class_map" placeholder="/path/to/class_to_idx.json">
                            </label>
                            <label id="zeroShotLabel" style="display:none; grid-column: 1 / -1;">Zero-Shot Classes
                                (comma-separated, for CLIP)
                                <input type="text" name="candidate_classes" placeholder="e.g. cat, dog, bird, car">
                            </label>
                        </div>

                        <hr style="border: 0; border-top: 1px solid rgba(255, 255, 255, 0.2); margin: 2rem 0;">

                        <div class="results-inference">
                            <h3 style="font-size: 1.2rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--white);
            transition: opacity 0.5s ease; margin-bottom: 1.5rem;">
                                Results</h3>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Class</th>
                                        <th>Probability</th>
                                    </tr>
                                </thead>
                                <tbody id="resultsBody"></tbody>
                            </table>
                        </div>

                        <button class="btn" type="submit" id="submitBtn">Classify Image</button>
                    </form>
                </div>
            </div>

            <!-- ─── Tab: Fine-Tuning System ─── -->
            <div class="tab-panel" id="panel-finetuning">
                <div class="card">
                    <h2>Fine-Tuning System</h2>
                    <form id="trainForm">
                        <div class="form-grid full"><label>Dataset Directory (Absolute Path)<input type="text"
                                    name="data_dir" placeholder="/home/user/dataset" required></label></div>
                        <div class="form-grid">
                            <label>Backbone Architecture
                                <select name="model">
                                    <option value="mobilenet_v3_small">MobileNet v3 (Small)</option>
                                    <option value="mobilenet_v3_large">MobileNet v3 (Large)</option>
                                    <option value="resnet18">ResNet18</option>
                                    <option value="resnet50">ResNet50</option>
                                </select>
                            </label>
                            <label>Device<select name="device">
                                    <option value="cpu">CPU</option>
                                    <option value="cuda" selected>CUDA</option>
                                </select></label>
                            <label>Epochs<input type="number" name="epochs" value="10"></label>
                            <label>Batch Size<input type="number" name="batch_size" value="32"></label>
                            <label>Learning Rate<input type="number" step="0.0001" name="lr" value="0.0001"></label>
                        </div>
                        <button class="btn" type="submit" id="trainSubmitBtn">Start Training Job</button>
                    </form>
                    <div class="results-ft" id="trainResultsBox"></div>
                </div>
            </div>

        </div>

        <script>
            // ── Tab switching ──
            function switchTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('tab-' + tab).classList.add('active');
                document.getElementById('panel-' + tab).classList.add('active');
            }

            // Common UI logic handled by common.js

            // ── Inference Engine logic ──
            const fileInput = document.getElementById('imageInput');
            const dropZone = document.getElementById('dropZone');
            const previewContainer = document.getElementById('previewContainer');
            const previewImage = document.getElementById('previewImage');
            const removePhotoBtn = document.getElementById('removePhotoBtn');
            const form = document.getElementById('predictForm');
            const submitBtn = document.getElementById('submitBtn');
            const resultsBody = document.getElementById('resultsBody');
            const topkInput = document.getElementById('topkInput');

            const modelSelect = document.querySelector('select[name="model"]');
            const zeroShotLabel = document.getElementById('zeroShotLabel');
            modelSelect.addEventListener('change', () => {
                if (modelSelect.value === 'clip-vit-base-patch32') {
                    zeroShotLabel.style.display = 'flex';
                } else {
                    zeroShotLabel.style.display = 'none';
                    document.querySelector('input[name="candidate_classes"]').value = '';
                }
            });

            function updatePlaceholders() {
                const count = parseInt(topkInput.value) || 3;
                resultsBody.innerHTML = '';
                for (let i = 0; i < count; i++) {
                    resultsBody.innerHTML += `<tr style="opacity: 0.2;">
                    <td>Waiting...</td>
                    <td>
                        <div class="prob-container">
                            <div class="prob-bar-wrapper">
                                <div style="height:100%; width:0%; background:var(--bg);"></div>
                            </div>
                            <span class="prob-value">--%</span>
                        </div>
                    </td>
                </tr>`;
                }
            }
            topkInput.addEventListener('input', updatePlaceholders);
            updatePlaceholders();

            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = () => { if (fileInput.files[0]) showPreview(fileInput.files[0]); };
            removePhotoBtn.onclick = (e) => { e.stopPropagation(); fileInput.value = ''; previewContainer.classList.remove('active'); updatePlaceholders(); };

            function showPreview(file) {
                const reader = new FileReader();
                reader.onload = e => { previewImage.src = e.target.result; previewContainer.classList.add('active'); };
                reader.readAsDataURL(file);
            }

            form.onsubmit = async (e) => {
                e.preventDefault();
                if (!fileInput.files.length) return alert('Select image');

                const count = parseInt(topkInput.value) || 3;
                resultsBody.innerHTML = '';
                for (let i = 0; i < count; i++) {
                    resultsBody.innerHTML += `<tr>
                    <td>Classifying...</td>
                    <td><div style="height:4px; width:100%; background:var(--primary); border-radius:2px; animation: pulse 1s infinite alternate;"></div></td>
                </tr>`;
                }

                submitBtn.innerHTML = '<span class="spinner"></span> Processing...';
                submitBtn.disabled = true;
                try {
                    const res = await fetch('/api/predict', { method: 'POST', body: new FormData(form) });
                    const json = await res.json();
                    if (json.status === 'ok') {
                        resultsBody.innerHTML = json.predictions.map(p => `
                        <tr>
                            <td>${p.class}</td>
                            <td>
                                <div class="prob-container">
                                    <div class="prob-bar-wrapper">
                                        <div class="prob-bar" style="width:${p.probability * 100}%"></div>
                                    </div>
                                    <span class="prob-value">${(p.probability * 100).toFixed(2)}%</span>
                                </div>
                            </td>
                        </tr>`).join('');
                    } else {
                        alert(json.message);
                        updatePlaceholders();
                    }
                } catch (err) {
                    alert(err.message);
                    updatePlaceholders();
                }
                finally { submitBtn.innerHTML = 'Classify Image'; submitBtn.disabled = false; }
            };

            // ── Fine-Tuning logic ──
            const trainForm = document.getElementById('trainForm');
            const trainSubmitBtn = document.getElementById('trainSubmitBtn');
            const trainResultsBox = document.getElementById('trainResultsBox');
            trainForm.onsubmit = async (e) => {
                e.preventDefault();
                trainSubmitBtn.innerHTML = '<span class="spinner"></span> Training...';
                trainSubmitBtn.disabled = true;
                try {
                    const formData = new FormData(trainForm);
                    const payload = Object.fromEntries(formData.entries());
                    payload.epochs = parseInt(payload.epochs);
                    payload.batch_size = parseInt(payload.batch_size);
                    payload.lr = parseFloat(payload.lr);
                    const res = await fetch('/api/train', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const json = await res.json();
                    if (json.status === 'ok') {
                        trainResultsBox.textContent = "=== Job Finished ===\n\n" + json.output;
                        trainResultsBox.classList.add('visible');
                    } else alert(json.message);
                } catch (err) { alert(err.message); }
                finally { trainSubmitBtn.innerHTML = 'Start Training Job'; trainSubmitBtn.disabled = false; }
            };
        </script>
    <script src="/js/transition.js"></script>
    <script src="/js/common.js"></script>
    </div>
</body>

</html>
