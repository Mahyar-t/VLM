<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiluLab - Contact</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/site/style.css">
    <style>
        /* ── Main ── */
        .main-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 7.5rem;
            animation: fadeIn 1s ease-out forwards;
        }

        .contact-container {
            max-width: 1100px;
            width: 100%;
            padding: 0 4rem 6rem;
        }

        /* ── Heading ── */
        .contact-heading {
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .contact-heading .accent {
            color: var(--primary);
            filter: drop-shadow(0 0 20px rgba(95, 209, 212, 0.35));
        }

        /* ── Card ── */
        .contact-card {
            background: rgba(28, 51, 66, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: var(--radius);
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* ── Form ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .form-field label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
        }

        .form-field input,
        .form-field textarea {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px 8px 0 0;
            padding: 0.9rem 1rem;
            color: var(--white);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.25s, background 0.25s;
            width: 100%;
        }

        .form-field input::placeholder,
        .form-field textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-field input:hover,
        .form-field textarea:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .form-field input:focus,
        .form-field textarea:focus {
            border-bottom-color: var(--primary);
            background: rgba(95, 209, 212, 0.05);
        }

        .form-field textarea {
            resize: none;
            margin-bottom: 2rem;
        }

        /* ── Submit row ── */
        .form-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .submit-btn {
            padding: 1rem 2.5rem;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(95, 209, 212, 0.25);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-msg {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            display: none;
        }

        .status-msg.success {
            color: #4ade80;
            display: block;
        }

        .status-msg.error {
            color: #f87171;
            display: block;
        }

        .powered-by {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <button class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><a href="/"><img src="/images/logo.png" alt="NiluLab Logo"></a></div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link">Dashboard</a>
            <a href="/site/inference.html" class="sidebar-link">Image Classifiers</a>
            <a href="/site/vqa.html" class="sidebar-link">Visual Question Answering</a>
            <a href="/site/caption.html" class="sidebar-link">Image Captioning</a>
        </nav>
        <div style="margin-top:auto;"><a href="https://github.com/Mahyar-t/VLM" target="_blank"
                class="sidebar-link">GitHub Repo</a></div>
    </aside>

    <header class="top-bar">
        <div class="top-bar-brand">
            <h1><a href="/">NiluLab</a></h1>
            <p>Computer Vision Toolkit</p>
        </div>
        <nav class="top-nav">
            <a href="/site/about.html">About</a>
            <a href="/site/contact.html" style="color: var(--primary) !important; opacity: 1;">Contact</a>
        </nav>
    </header>

    <div class="main-wrapper">
        <div class="contact-container">

            <h1 class="contact-heading">Get In <span class="accent">Touch</span></h1>

            <div class="contact-card">
                <form id="contactForm">
                    <div class="form-row">
                        <div class="form-field">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="form-field">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="How can I help?"
                            required></textarea>
                    </div>

                    <div class="form-actions">
                        <button class="submit-btn" type="submit" id="submitBtn">Send Message</button>
                        <span class="status-msg" id="statusMsg"></span>
                    </div>

                    <p class="powered-by">Powered by FormSubmit.</p>
                </form>
            </div>

        </div>
    </div>

    <script>
        // ── Sidebar ──
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleSidebar() { menuBtn.classList.toggle('active'); sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
        menuBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // ── Scroll-to-hide top bar ──
        (function () {
            var lastScroll = 0;
            var topBar = document.querySelector('.top-bar');
            window.addEventListener('scroll', function () {
                var current = window.scrollY || document.documentElement.scrollTop;
                if (current > lastScroll && current > 80) { topBar.classList.add('hidden'); }
                else { topBar.classList.remove('hidden'); }
                lastScroll = current <= 0 ? 0 : current;
            }, { passive: true });
        })();

        // ── Form submission via FormSubmit ──
        document.getElementById('contactForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('statusMsg');
            const form = e.target;

            btn.disabled = true;
            btn.textContent = 'Sending...';
            msg.className = 'status-msg';
            msg.textContent = '';

            const payload = {
                name: form.name.value,
                email: form.email.value,
                message: form.message.value
            };

            try {
                const res = await fetch('https://formsubmit.co/ajax/mahyar.taherpour@outlook.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    msg.textContent = 'Message sent successfully!';
                    msg.className = 'status-msg success';
                    form.reset();
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                msg.textContent = 'Failed to send. Please try again.';
                msg.className = 'status-msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Message';
            }
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            requestAnimationFrame(function () { document.body.style.opacity = "1"; });
        });
        document.querySelectorAll("a.sidebar-link, .sidebar-header a, .top-nav a").forEach(function (link) {
            link.addEventListener("click", function (e) {
                var href = link.getAttribute("href");
                if (href && href !== window.location.pathname && !href.startsWith("#")) {
                    e.preventDefault();
                    var sidebar = document.getElementById("sidebar");
                    var overlay = document.getElementById("overlay");
                    var menuBtn = document.getElementById("menuBtn");
                    if (sidebar) { sidebar.classList.remove("active"); }
                    if (overlay) { overlay.classList.remove("active"); }
                    if (menuBtn) { menuBtn.classList.remove("active"); }
                    setTimeout(function () {
                        document.body.style.opacity = "0";
                        setTimeout(function () { window.location.href = href; }, 620);
                    }, 150);
                }
            });
        });
    </script>
</body>

</html>
