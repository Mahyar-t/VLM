<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiluLab API - VQA</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* -- Main Content -- */

        .container {
            max-width: 1400px;
            width: 100%;
            padding: 0 4rem 4rem;
            z-index: 10;
        }

        .card {
            background: rgba(28, 51, 66, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: var(--radius);
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        h2 {
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 2.5rem;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .drop-zone {
            width: 100%;
            height: 400px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            transition: all .2s;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            margin-bottom: 3.5rem;
            position: relative;
            font-size: 1.2rem;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(95, 209, 212, 0.05);
            color: var(--primary);
        }

        .preview-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            border-radius: var(--radius);
            overflow: hidden;
        }

        .preview-container.active {
            display: block;
        }

        .preview-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .form-grid label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .form-grid input,
        .form-grid select {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.2rem 1.5rem;
            color: var(--white);
            font-family: inherit;
            font-size: 1.1rem;
            transition: border-color 0.2s;
        }

        .form-grid select option {
            background-color: var(--dark);
            color: var(--white);
        }

        .form-grid input:focus,
        .form-grid select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.2rem 3rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(95, 209, 212, 0.3);
            color: var(--dark);
        }

        .results {
            margin-top: 3rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 2rem;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .results p {
            font-size: 1.5rem;
            color: var(--white);
            text-align: center;
            font-weight: 500;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <button class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><a href="/"><img src="/logo.png" alt="Logo"></a></div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link">Dashboard</a>
            <a href="/inference.html" class="sidebar-link">Image Classifiers</a>
            <a href="/vqa.html" class="sidebar-link active">Visual Question Answering</a>
            <a href="/caption.html" class="sidebar-link">Image Captioning</a>
        </nav>
        <div style="margin-top:auto;"><a href="https://github.com/Mahyar-t/VLM" target="_blank"
                class="sidebar-link">GitHub Repo</a></div>
    </aside>
    <header class="top-bar">
        <div class="top-bar-brand">
            <h1><a href="/">NiluLab</a></h1>
            <p>Computer Vision Toolkit</p>
        </div>
        <nav class="top-nav">
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
        </nav>
    </header>


    <div class="main-wrapper">



        <div class="container">
            <div class="card">
                <h2>Visual Question Answering</h2>
                <form id="vqaForm">
                    <div class="drop-zone" id="dropZone">
                        <p>Drag & drop or click to upload</p>
                        <div class="preview-container" id="previewContainer">
                            <img id="previewImage" src="" alt="Preview">
                            <button type="button"
                                style="position:absolute;top:15px;right:15px;background:var(--dark);color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:12px;"
                                id="removePhotoBtn">REMOVE</button>
                        </div>
                    </div>
                    <input type="file" id="imageInput" name="image" accept="image/*" style="display:none">

                    <div class="form-grid">
                        <label>VQA Model
                            <select id="modelSelect" name="model">
                                <option value="" selected disabled>-- Select a Model --</option>
                                <option value="Salesforce/blip-vqa-capfilt-large">BLIP VQA Capfilt Large (High Quality)
                                </option>
                                <option value="Salesforce/blip-vqa-base">BLIP VQA Base (Faster)</option>
                            </select>
                        </label>
                        <label>Question
                            <input type="text" name="question" placeholder="e.g. What color is the car in the image?"
                                required>
                        </label>
                        <label>Device
                            <select id="deviceSelect" name="device">
                                <option value="cpu">CPU</option>
                                <option value="cuda" selected>CUDA</option>
                            </select>
                        </label>
                    </div>

                    <button class="btn" type="submit" id="submitBtn" disabled>Generate Answer</button>

                    <!-- Progress bar shown during model loading -->
                    <div id="loadProgressContainer" style="display:none; width:100%; margin-top: 0.5rem;">
                        <div
                            style="display:flex; justify-content:space-between; font-size:0.75rem; color: var(--primary); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px;">
                            <span id="loadStageLabel">Loading...</span>
                            <span id="loadPercent">0%</span>
                        </div>
                        <div
                            style="background:rgba(255,255,255,0.08); border-radius:99px; height:6px; overflow:hidden;">
                            <div id="loadProgressBar"
                                style="height:100%; width:0%; background: linear-gradient(90deg, var(--primary), #00f0ff); border-radius:99px; transition: width 0.4s ease;">
                            </div>
                        </div>
                    </div>

                    <div class="results">
                        <p id="resultsBody" style="opacity: 0.5;">Waiting for question...</p>
                    </div>
                </form>
            </div>
        </div>

        <script>
            const menuBtn = document.getElementById('menuBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            function toggleSidebar() { menuBtn.classList.toggle('active'); sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
            menuBtn.addEventListener('click', toggleSidebar);
            overlay.addEventListener('click', toggleSidebar);

            // Scroll-to-hide top bar
            (function () {
                var lastScroll = 0;
                var topBar = document.querySelector('.top-bar');
                window.addEventListener('scroll', function () {
                    var current = window.scrollY || document.documentElement.scrollTop;
                    if (current > lastScroll && current > 80) {
                        topBar.classList.add('hidden');
                    } else {
                        topBar.classList.remove('hidden');
                    }
                    lastScroll = current <= 0 ? 0 : current;
                }, { passive: true });
            })();

            const fileInput = document.getElementById('imageInput');
            const dropZone = document.getElementById('dropZone');
            const previewContainer = document.getElementById('previewContainer');
            const previewImage = document.getElementById('previewImage');
            const removePhotoBtn = document.getElementById('removePhotoBtn');
            const form = document.getElementById('vqaForm');
            const submitBtn = document.getElementById('submitBtn');
            const resultsBody = document.getElementById('resultsBody');

            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = () => { if (fileInput.files[0]) showPreview(fileInput.files[0]); };
            removePhotoBtn.onclick = (e) => { e.stopPropagation(); fileInput.value = ''; previewContainer.classList.remove('active'); resultsBody.innerHTML = "Waiting for question..."; resultsBody.style.opacity = 0.5; };

            function showPreview(file) {
                const reader = new FileReader();
                reader.onload = e => { previewImage.src = e.target.result; previewContainer.classList.add('active'); };
                reader.readAsDataURL(file);
            }

            const modelSelect = document.getElementById('modelSelect');
            const deviceSelect = document.getElementById('deviceSelect');

            async function triggerPreload() {
                const selectedModel = modelSelect.value;
                if (!selectedModel) return;

                const selectedDevice = deviceSelect.value;
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<span class="spinner"></span> Loading...`;

                // Show the progress bar
                const progressContainer = document.getElementById('loadProgressContainer');
                const progressBar = document.getElementById('loadProgressBar');
                const stageLabel = document.getElementById('loadStageLabel');
                const percentLabel = document.getElementById('loadPercent');
                progressContainer.style.display = 'block';
                progressBar.style.width = '5%';
                stageLabel.textContent = 'Queued...';
                percentLabel.textContent = '5%';

                // Start polling for real stage updates
                let pollInterval = setInterval(async () => {
                    try {
                        const statusRes = await fetch(`/api/preload-status?model_name=${encodeURIComponent(selectedModel)}&device=${encodeURIComponent(selectedDevice)}`);
                        if (!statusRes.ok) return;
                        const status = await statusRes.json();
                        progressBar.style.width = status.percent + '%';
                        stageLabel.textContent = status.label;
                        percentLabel.textContent = status.percent + '%';
                        if (status.stage === 'done' || status.stage === 'error') {
                            clearInterval(pollInterval);
                        }
                    } catch (_) { /* ignore transient errors */ }
                }, 500);

                try {
                    const formData = new FormData();
                    formData.append('model', selectedModel);
                    formData.append('device', selectedDevice);
                    formData.append('task', 'vqa');

                    const res = await fetch('/api/preload', { method: 'POST', body: formData });
                    clearInterval(pollInterval);
                    if (res.ok) {
                        progressBar.style.width = '100%';
                        stageLabel.textContent = 'Ready!';
                        percentLabel.textContent = '100%';
                        setTimeout(() => { progressContainer.style.display = 'none'; }, 1000);
                        submitBtn.innerHTML = 'Generate Answer';
                        submitBtn.disabled = false;
                    } else {
                        throw new Error("Failed to load model.");
                    }
                } catch (e) {
                    clearInterval(pollInterval);
                    progressContainer.style.display = 'none';
                    submitBtn.innerHTML = 'Preload Failed. Try Generation manually.';
                    submitBtn.disabled = false;
                }
            }

            modelSelect.addEventListener('change', triggerPreload);
            deviceSelect.addEventListener('change', triggerPreload);

            form.onsubmit = async (e) => {
                e.preventDefault();
                const resolvedModel = modelSelect.value;
                if (!resolvedModel) return alert('Select a VQA Model first');
                if (!fileInput.files.length) return alert('Select image');
                const questionInput = document.querySelector('input[name="question"]').value;
                if (!questionInput.trim()) return alert('Please enter a question');

                resultsBody.innerHTML = 'Thinking...';
                resultsBody.style.opacity = 1;

                submitBtn.innerHTML = '<span class="spinner"></span> Processing...';
                submitBtn.disabled = true;
                try {
                    const res = await fetch('/api/vqa', { method: 'POST', body: new FormData(form) });
                    const json = await res.json();
                    if (json.status === 'ok') {
                        resultsBody.innerHTML = json.answer;
                        resultsBody.style.color = "var(--primary)";
                        resultsBody.style.fontWeight = "bold";
                        resultsBody.style.fontSize = "2rem";
                    } else {
                        alert(json.message);
                        resultsBody.innerHTML = "Error occurred.";
                        resultsBody.style.opacity = 0.5;
                    }
                } catch (err) {
                    alert(err.message);
                    resultsBody.innerHTML = "Error occurred.";
                    resultsBody.style.opacity = 0.5;
                }
                finally { submitBtn.innerHTML = 'Generate Answer'; submitBtn.disabled = false; }
            };
        </script>
        <script>
            // Page fade-in on load
            document.addEventListener("DOMContentLoaded", function () {
                requestAnimationFrame(function () { document.body.style.opacity = "1"; });
            });
            // Fade-out only for sidebar navigation links (not the menu toggle or form links)
            document.querySelectorAll("a.sidebar-link, .sidebar-header a, .top-nav a").forEach(function (link) {
                link.addEventListener("click", function (e) {
                    var href = link.getAttribute("href");
                    if (href && href !== window.location.pathname && !href.startsWith("#")) {
                        e.preventDefault();
                        // Close sidebar first, then fade and navigate
                        var sidebar = document.getElementById("sidebar");
                        var overlay = document.getElementById("overlay");
                        var menuBtn = document.getElementById("menuBtn");
                        if (sidebar) { sidebar.classList.remove("active"); }
                        if (overlay) { overlay.classList.remove("active"); }
                        if (menuBtn) { menuBtn.classList.remove("active"); }
                        setTimeout(function () {
                            document.body.style.opacity = "0";
                            setTimeout(function () { window.location.href = href; }, 620);
                        }, 150);
                    }
                });
            });
        </script>
</body>

</html>
